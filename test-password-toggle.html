<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Test — Password Toggle</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { display:grid; place-items:center; min-height:100vh; background:transparent; }
    .wrap { width:400px; padding:2rem; background:rgba(4,7,22,0.98); border-radius:16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:0 0 1rem">Password Toggle Test</h2>
    <form class="login-form" onsubmit="return false;">
      <label class="field-label" for="passwordRegister">Nenosiri</label>
      <div class="password-group">
        <input id="passwordRegister" name="password" type="password" placeholder="Tengeneza nenosiri salama" required />
        <button type="button" class="visibility-toggle" data-target="passwordRegister" aria-label="Onyesha nenosiri" aria-pressed="false">
          <span class="vis-icon">
            <span class="icon-open" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <span class="icon-closed" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6 0-10-7-10-7 .86-1.6 2.08-3.17 3.62-4.5M3 3l18 18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.88 9.88A3 3 0 0 0 14.12 14.12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
          </span>
          <span class="vis-label">Onyesha</span>
        </button>
      </div>

      <label class="field-label" for="passwordConfirm">Rudia Nenosiri</label>
      <div class="password-group">
        <input id="passwordConfirm" name="passwordConfirm" type="password" placeholder="Rudia nenosiri lako" required />
        <button type="button" class="visibility-toggle" data-target="passwordConfirm" aria-label="Onyesha nenosiri" aria-pressed="false">
          <span class="vis-icon">
            <span class="icon-open" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <span class="icon-closed" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6 0-10-7-10-7 .86-1.6 2.08-3.17 3.62-4.5M3 3l18 18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.88 9.88A3 3 0 0 0 14.12 14.12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
          </span>
          <span class="vis-label">Onyesha</span>
        </button>
      </div>

    </form>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
